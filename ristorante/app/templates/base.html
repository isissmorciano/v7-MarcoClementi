<!doctype html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}Ristorante{% endblock %}</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }

        nav {
            background-color: #333;
            padding: 10px 0;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            display: inline-block;
        }

        nav a:hover {
            color: #ffcc00;
        }

        h1 {
            color: #333;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }

        .flash {
            color: red;
            border: 1px solid red;
            padding: 10px;
            margin-bottom: 10px;
            background-color: #ffe0e0;
            border-radius: 5px;
        }

        .card {
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .card a {
            color: #0066cc;
            text-decoration: none;
        }

        .card a:hover {
            text-decoration: underline;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        table th {
            background-color: #333;
            color: white;
            padding: 10px;
            text-align: left;
        }

        table td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        table tr:hover {
            background-color: #f0f0f0;
        }

        form {
            background-color: white;
            padding: 15px;
            border-radius: 5px;
            margin-top: 10px;
        }

        form label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        form input,
        form select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 3px;
            box-sizing: border-box;
        }

        form button {
            background-color: #333;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            margin-top: 15px;
        }

        form button:hover {
            background-color: #555;
        }

        .back-link {
            margin-top: 20px;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>

<body>
    <nav>
        <a href="{{ url_for('main.index') }}">🏠 Home</a>
        <a href="{{ url_for('main.crea_categoria') }}">➕ Crea Categoria</a>
        <a href="{{ url_for('main.crea_piatto') }}">➕ Crea Piatto</a>
        <a href="{{ url_for('main.ricerca') }}">🔍 Ricerca</a>
    </nav>

    <h1>{% block title %}Ristorante{% endblock %}</h1>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    {% for message in messages %}
    <div class="flash">{{ message }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

    <footer>
        © 2024 - Ristorante App
    </footer>
</body>

</html>
